# Development profile configuration overrides

# Database Configuration
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/orders
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# Redis Configuration
  redis:
    host: localhost
    port: 6379

# Kafka Configuration
  kafka:
    bootstrap-servers: localhost:9092

# JMS Configuration (Artemis)
  artemis:
    broker-url: tcp://localhost:61616
    user: artemis
    password: artemis

# gRPC Configuration
grpc:
  client:
    shipping-service:
      address: static://localhost:9090

# External Service Mocks (for development)
external:
  services:
    payment:
      url: http://localhost:8081
      mock-enabled: true
    inventory:
      url: http://localhost:8082
      mock-enabled: true
    notification:
      url: http://localhost:8083
      mock-enabled: true

# Saga Configuration - shorter timeouts for development
saga:
  timeout:
    default-threshold: PT1M
    scheduler:
      timeout-scan-interval: PT10S

# Cache Configuration - shorter TTLs for development
cache:
  redis:
    default-ttl: PT2M
    saga-state-ttl: PT5M

# Logging Configuration
logging:
  level:
    ai.shreds: DEBUG
    org.springframework.kafka: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    io.grpc: INFO