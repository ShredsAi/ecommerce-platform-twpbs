server:
  port: 8080

spring:
  application:
    name: webhook-reconciliation-shred
  datasource:
    url: jdbc:postgresql://localhost:5432/webhook_reconciliation
    username: webhook_user
    password: webhook_pass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      acks: all
      retries: 3
      enable-idempotence: true
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      properties:
        max.in.flight.requests.per.connection: 1

webhook:
  stripe:
    signing-secret: ${STRIPE_WEBHOOK_SECRET:whsec_test_secret}
  paypal:
    cert-url: ${PAYPAL_CERT_URL:https://api.paypal.com/v1/notifications/webhooks-events}
  square:
    application-secret: ${SQUARE_APP_SECRET:sq_app_secret}

scheduling:
  correlation:
    fixed-delay: 30000  # 30 seconds
  reconciliation:
    fixed-delay: 300000 # 5 minutes

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    ai.shreds: INFO
    org.springframework.kafka: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{ISO8601} [%thread] %-5level %logger{36} - %msg%n"