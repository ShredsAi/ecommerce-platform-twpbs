# Production profile configuration
spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME:inventory_user}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:50}
      minimum-idle: ${DB_POOL_MIN_IDLE:10}
      connection-timeout: ${DB_CONNECTION_TIMEOUT:30000}
      idle-timeout: ${DB_IDLE_TIMEOUT:600000}
      max-lifetime: ${DB_MAX_LIFETIME:1800000}
      leak-detection-threshold: ${DB_LEAK_DETECTION:60000}
  
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
        connection:
          provider_disables_autocommit: true
        cache:
          use_second_level_cache: false
          use_query_cache: false
  
  redis:
    host: ${REDIS_HOST}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    timeout: ${REDIS_TIMEOUT:3000ms}
    database: ${REDIS_DATABASE:0}
    lettuce:
      pool:
        max-active: ${REDIS_POOL_MAX_ACTIVE:20}
        max-idle: ${REDIS_POOL_MAX_IDLE:10}
        min-idle: ${REDIS_POOL_MIN_IDLE:5}
        max-wait: ${REDIS_POOL_MAX_WAIT:5000ms}
      shutdown-timeout: ${REDIS_SHUTDOWN_TIMEOUT:2000ms}
  
  kafka:
    bootstrap-servers: ${KAFKA_BROKERS}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: ${KAFKA_PRODUCER_RETRIES:3}
      batch-size: ${KAFKA_PRODUCER_BATCH_SIZE:32768}
      linger-ms: ${KAFKA_PRODUCER_LINGER_MS:5}
      buffer-memory: ${KAFKA_PRODUCER_BUFFER_MEMORY:67108864}
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 1
        compression.type: snappy
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      group-id: ${KAFKA_CONSUMER_GROUP_ID:inventory-tracking-prod}
      auto-offset-reset: earliest
      fetch-min-size: ${KAFKA_CONSUMER_FETCH_MIN_SIZE:1024}
      max-poll-records: ${KAFKA_CONSUMER_MAX_POLL_RECORDS:500}
      properties:
        spring.json.trusted.packages: "*"
        session.timeout.ms: 30000
        heartbeat.interval.ms: 10000
  
  jms:
    activemq:
      broker-url: ${JMS_BROKER_URL:${ACTIVEMQ_URL}}
      user: ${JMS_USERNAME:}
      password: ${JMS_PASSWORD:}
      pool:
        enabled: true
        max-connections: ${JMS_POOL_MAX_CONNECTIONS:20}
        idle-timeout: ${JMS_POOL_IDLE_TIMEOUT:30000}
        time-between-expiration-check: ${JMS_POOL_EXPIRATION_CHECK:10000}
    listener:
      acknowledge-mode: auto
      concurrency: ${JMS_LISTENER_CONCURRENCY:5-15}
      receive-timeout: ${JMS_LISTENER_TIMEOUT:10000}

# Production-specific inventory configurations
inventory:
  kafka:
    topics:
      inventory-events: ${KAFKA_TOPIC_INVENTORY_EVENTS:inventory.events}
      low-stock-alerts: ${KAFKA_TOPIC_LOW_STOCK_ALERTS:inventory.alerts.low-stock}
  jms:
    queues:
      erp-updates: ${JMS_QUEUE_ERP_UPDATES:inventory.tracking.erp.updates}
      inventory-notifications: ${JMS_QUEUE_INVENTORY_NOTIFICATIONS:inventory.changes.notification}
  safety-stock:
    monitor-interval: ${SAFETY_STOCK_MONITOR_INTERVAL:300000}  # 5 minutes
    batch-size: ${SAFETY_STOCK_BATCH_SIZE:5000}
  erp-sync:
    batch-size: ${ERP_SYNC_BATCH_SIZE:1000}
    chunk-size: ${ERP_SYNC_CHUNK_SIZE:200}
    max-retries: ${ERP_SYNC_MAX_RETRIES:3}

# Production cache settings
cache:
  ttl: ${CACHE_TTL:60s}
  caffeine:
    maximum-size: ${CACHE_MAX_SIZE:50000}
    expire-after-write: ${CACHE_EXPIRE_AFTER_WRITE:300s}

# Production outbox settings
outbox:
  batch-size: ${OUTBOX_BATCH_SIZE:500}
  processing-interval: ${OUTBOX_PROCESSING_INTERVAL:10000}  # 10 seconds
  max-retries: ${OUTBOX_MAX_RETRIES:3}
  retry-delay: ${OUTBOX_RETRY_DELAY:30000}  # 30 seconds

# Production logging configuration
logging:
  level:
    root: WARN
    ai.shreds: INFO
    org.springframework: WARN
    org.hibernate: WARN
    org.apache.kafka: WARN
    redis.clients: WARN
  pattern:
    console: "%d{ISO8601} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: ${LOG_FILE_PATH:/app/logs/inventory-tracking.log}
    max-size: ${LOG_MAX_SIZE:50MB}
    max-history: ${LOG_MAX_HISTORY:30}
    total-size-cap: ${LOG_TOTAL_SIZE_CAP:1GB}

# Production actuator settings
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus,info
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      show-components: always
      probes:
        enabled: true
    metrics:
      enabled: true
    prometheus:
      enabled: true
  health:
    redis:
      enabled: true
    db:
      enabled: true
    kafka:
      enabled: true
    jms:
      enabled: true
    diskspace:
      enabled: true
      threshold: ${HEALTH_DISKSPACE_THRESHOLD:10GB}
  metrics:
    enable:
      jvm: true
      system: true
      web: true
      kafka: true
      redis: true
    export:
      prometheus:
        enabled: true
        step: ${METRICS_STEP:60s}
    tags:
      application: inventory-tracking-shred
      environment: production
      version: ${BUILD_VERSION:1.0.0}

# Production server settings
server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful
  tomcat:
    connection-timeout: ${SERVER_CONNECTION_TIMEOUT:20000}
    max-connections: ${SERVER_MAX_CONNECTIONS:10000}
    threads:
      max: ${SERVER_MAX_THREADS:200}
      min-spare: ${SERVER_MIN_SPARE_THREADS:10}
    accesslog:
      enabled: ${SERVER_ACCESS_LOG_ENABLED:true}
      directory: ${SERVER_ACCESS_LOG_DIR:/app/logs}
      pattern: "%h %l %u %t \"%r\" %s %b %D"
      rotate: true
      max-days: ${SERVER_ACCESS_LOG_MAX_DAYS:30}

# Production security settings
security:
  authentication:
    jwt:
      secret: ${JWT_SECRET}
      expiration: ${JWT_EXPIRATION:86400000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}
    allowed-methods: ${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,OPTIONS}
    allowed-headers: ${CORS_ALLOWED_HEADERS:*}
    allow-credentials: ${CORS_ALLOW_CREDENTIALS:true}

# External service configurations
external-services:
  product-catalog:
    base-url: ${PRODUCT_CATALOG_BASE_URL}
    timeout: ${PRODUCT_CATALOG_TIMEOUT:5000}
    max-retries: ${PRODUCT_CATALOG_MAX_RETRIES:3}
  notification-service:
    enabled: ${NOTIFICATION_SERVICE_ENABLED:true}
    timeout: ${NOTIFICATION_SERVICE_TIMEOUT:10000}

# Production resilience settings
resilience:
  circuit-breaker:
    enabled: true
    failure-rate-threshold: ${CIRCUIT_BREAKER_FAILURE_RATE:50}
    wait-duration: ${CIRCUIT_BREAKER_WAIT_DURATION:30000}
    sliding-window-size: ${CIRCUIT_BREAKER_SLIDING_WINDOW:10}
  retry:
    max-attempts: ${RETRY_MAX_ATTEMPTS:3}
    wait-duration: ${RETRY_WAIT_DURATION:1000}
  timeout:
    default: ${TIMEOUT_DEFAULT:30000}
    database: ${TIMEOUT_DATABASE:10000}
    cache: ${TIMEOUT_CACHE:2000}