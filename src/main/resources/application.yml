server:
  port: 8080
  shutdown: graceful
  compression:
    enabled: true

spring:
  application:
    name: payment-processing-shred
  datasource:
    url: jdbc:postgresql://localhost:5432/payments
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 20000
  jpa:
    open-in-view: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc.batch_size: 50
        order_inserts: true
        order_updates: true
        format_sql: false
        show_sql: false
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
    consumer:
      group-id: payment-processing-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: ai.shreds.*
    topics:
      order-events: order-events
      payment-events: payment-events
  jackson:
    default-property-inclusion: non_null
    deserialization:
      fail-on-unknown-properties: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

# External Service URLs
stripe:
  api-url: https://api.stripe.com/v1
  api-key: ${STRIPE_API_KEY:sk_test_51Hq}
  webhooks-secret: ${STRIPE_WEBHOOK_SECRET:whsec_test}

paypal:
  api-url: https://api.paypal.com/v2
  client-id: ${PAYPAL_CLIENT_ID:test_client_id}
  client-secret: ${PAYPAL_CLIENT_SECRET:test_client_secret}

square:
  api-url: https://connect.squareup.com/v2
  access-token: ${SQUARE_ACCESS_TOKEN:test_token}

pci-vault:
  api-url: https://vault.example.com/api
  api-key: ${VAULT_API_KEY:test_key}

three-ds:
  provider-url: https://3ds.example.com/api
  api-key: ${THREEDS_API_KEY:test_key}

# Resilience4j Configuration
resilience4j:
  circuitbreaker:
    configs:
      default:
        registerHealthIndicator: true
        slidingWindowSize: 100
        minimumNumberOfCalls: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 60s
        permittedNumberOfCallsInHalfOpenState: 5
        automaticTransitionFromOpenToHalfOpenEnabled: true
      stripe:
        baseConfig: default
        slidingWindowSize: 50
      paypal:
        baseConfig: default
        slidingWindowSize: 30
      square:
        baseConfig: default
        slidingWindowSize: 20
    instances:
      stripeCircuitBreaker:
        baseConfig: stripe
      paypalCircuitBreaker:
        baseConfig: paypal
      squareCircuitBreaker:
        baseConfig: square
      vaultCircuitBreaker:
        baseConfig: default
      threeDSCircuitBreaker:
        baseConfig: default
  retry:
    configs:
      default:
        maxAttempts: 3
        waitDuration: 500ms
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
    instances:
      stripeRetry:
        baseConfig: default
      paypalRetry:
        baseConfig: default
      squareRetry:
        baseConfig: default
  bulkhead:
    configs:
      default:
        maxConcurrentCalls: 20
    instances:
      stripeProcessorBulkhead:
        baseConfig: default
        maxConcurrentCalls: 15
      paypalProcessorBulkhead:
        baseConfig: default
        maxConcurrentCalls: 10
      squareProcessorBulkhead:
        baseConfig: default
        maxConcurrentCalls: 10

# Async Configuration
async:
  thread-pool:
    core-size: 10
    max-size: 50
    queue-capacity: 100
    thread-name-prefix: payment-async-

# Management Endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    export:
      prometheus:
        enabled: true

# Logging Configuration
logging:
  level:
    root: INFO
    ai.shreds: INFO
    org.springframework: INFO
    org.hibernate: INFO
    org.apache.kafka: WARN
