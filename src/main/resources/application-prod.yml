spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://postgres:5432/orders_prod}
    username: ${DB_USERNAME:order_user}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:30}
      minimum-idle: ${DB_POOL_MIN_IDLE:10}
      connection-timeout: ${DB_CONNECTION_TIMEOUT:30000}
      
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        generate_statistics: false
        
  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:kafka:9092}
    consumer:
      properties:
        security.protocol: ${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
        
  liquibase:
    contexts: prod
    
grpc:
  client:
    inventory:
      address: ${INVENTORY_SERVICE_URL:static://inventory-service:50051}
      negotiation-type: ${INVENTORY_SERVICE_TLS:plaintext}
    pricing:
      address: ${PRICING_SERVICE_URL:static://pricing-service:50052}
      negotiation-type: ${PRICING_SERVICE_TLS:plaintext}
      
logging:
  level:
    root: ${LOG_LEVEL_ROOT:WARN}
    ai.shreds: ${LOG_LEVEL_APP:INFO}
    org.springframework: WARN
    org.hibernate: ERROR
    org.apache.kafka: WARN
  file:
    name: /app/logs/order-creation.log
    max-size: 100MB
    max-history: 30
    
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: never
      
server:
  port: ${SERVER_PORT:8080}
  tomcat:
    max-connections: ${SERVER_MAX_CONNECTIONS:20000}
    max-threads: ${SERVER_MAX_THREADS:400}
    
app:
  kafka:
    topics:
      cart-events: ${KAFKA_TOPIC_CART_EVENTS:shopping-cart-events}
  retry:
    max-attempts: ${RETRY_MAX_ATTEMPTS:3}
  cache:
    idempotency:
      ttl: ${CACHE_TTL:24h}
      max-size: ${CACHE_MAX_SIZE:50000}