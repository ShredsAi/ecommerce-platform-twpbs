# Docker profile configuration overrides
# Used when running the application in Docker containers

# Database Configuration - Docker network
spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/orders
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

# Redis Configuration - Docker network
  redis:
    host: redis
    port: 6379

# Kafka Configuration - Docker network
  kafka:
    bootstrap-servers: kafka:29092

# JMS Configuration - Docker network
  artemis:
    broker-url: tcp://artemis:61616
    user: artemis
    password: artemis

# gRPC Configuration - Docker network
grpc:
  client:
    shipping-service:
      address: static://shipping-service:9090

# External Service URLs - Docker network
external:
  services:
    payment:
      url: http://payment-service:8081
    inventory:
      url: http://inventory-service:8082
    notification:
      url: http://notification-service:8083

# Logging Configuration - Docker optimized
logging:
  level:
    ai.shreds: INFO
    org.springframework.kafka: WARN
    org.hibernate: WARN
    io.grpc: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{correlationId}] %logger{36} - %msg%n"

# Actuator Configuration - Docker
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info
  endpoint:
    health:
      show-details: when-authorized