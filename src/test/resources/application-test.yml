spring:
  application:
    name: order-cancellation-returns-test
  datasource:
    # Dynamic properties will override this via @DynamicPropertySource
    url: jdbc:postgresql://localhost:5432/testdb
    username: testuser
    password: testpass
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000
  jpa:
    hibernate:
      ddl-auto: create-drop
      naming:
        physical-strategy: org.hibernate.boot.model.naming.SnakeCasePhysicalNamingStrategy
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        generate_statistics: false
        jdbc:
          batch_size: 20
          order_inserts: true
          order_updates: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  kafka:
    bootstrap-servers: ${spring.embedded.kafka.brokers}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
    consumer:
      group-id: order-cancellation-returns-test
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: "ai.shreds.*"
  jms:
    activemq:
      broker-url: vm://localhost?broker.persistent=false
      user: admin
      password: admin
    template:
      receive-timeout: 1000
      delivery-mode: non_persistent

# Mock external services for testing
grpc:
  inventory:
    host: localhost
    port: 0  # Will be mocked
    deadline: 1s
  order:
    host: localhost
    port: 0  # Will be mocked
    deadline: 1s

payment:
  service:
    url: http://localhost:0  # Will be mocked
    timeout: 5s
    retry: 1

notification:
  service:
    url: http://localhost:0  # Will be mocked
    timeout: 5s
    retry: 1

resilience4j:
  retry:
    instances:
      payment-service:
        maxAttempts: 1
        waitDuration: 100ms
      inventory-service:
        maxAttempts: 1
        waitDuration: 100ms
      notification-service:
        maxAttempts: 1
        waitDuration: 100ms
  circuitbreaker:
    instances:
      inventory-service:
        registerHealthIndicator: false
        slidingWindowSize: 10
        slidingWindowType: COUNT_BASED
        failureRateThreshold: 50
        waitDurationInOpenState: 1s
        permittedNumberOfCallsInHalfOpenState: 1
        minimumNumberOfCalls: 1
      payment-service:
        registerHealthIndicator: false
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 1s
        permittedNumberOfCallsInHalfOpenState: 1
        minimumNumberOfCalls: 1

# Disable scheduling during tests to prevent database connection issues
scheduling:
  enabled: false
  cancellation:
    timeout: "-"  # Disabled for testing
  return:
    monitor: "-"   # Disabled for testing

business:
  rules:
    cancellation:
      window-hours: 24  # Extended for testing
      fraud-override: true
    return:
      period-days: 30
      holiday-extension-days: 15
      restocking-fee-percentage: 10

management:
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /actuator
  endpoint:
    health:
      show-details: always

logging:
  level:
    ai.shreds: INFO
    org.springframework.kafka: WARN
    org.springframework.jms: WARN
    org.hibernate.SQL: INFO
    org.testcontainers: INFO
    org.springframework.test: DEBUG

server:
  port: 0  # Use random port for testing
  servlet:
    context-path: /api/v1