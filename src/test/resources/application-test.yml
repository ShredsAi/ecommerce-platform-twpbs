server:
  port: 0  # Use random port for tests

spring:
  application:
    name: payment-processing-shred-test
  datasource:
    # These will be overridden by @DynamicPropertySource in test
    url: jdbc:postgresql://localhost:5433/test_payments
    username: test_user
    password: test_password
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      idle-timeout: 30000
      connection-timeout: 20000
  jpa:
    open-in-view: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        jdbc.batch_size: 10
        order_inserts: true
        order_updates: true
        format_sql: true
        show_sql: true
  kafka:
    # These will be overridden by @DynamicPropertySource in test
    bootstrap-servers: localhost:9093
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 1
      properties:
        enable.idempotence: true
    consumer:
      group-id: payment-processing-test-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: ai.shreds.*
    topics:
      order-events: test-order-events
      payment-events: test-payment-events
  jackson:
    default-property-inclusion: non_null
    deserialization:
      fail-on-unknown-properties: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    clean-disabled: false

# External Service URLs - These will be mocked in tests
stripe:
  api-url: http://localhost:8081/stripe
  api-key: sk_test_mock_key
  webhooks-secret: whsec_test_mock

paypal:
  api-url: http://localhost:8082/paypal
  client-id: test_mock_client_id
  client-secret: test_mock_client_secret

square:
  api-url: http://localhost:8083/square
  access-token: test_mock_token

pci-vault:
  api-url: http://localhost:8084/vault
  api-key: test_mock_vault_key

three-ds:
  provider-url: http://localhost:8085/3ds
  api-key: test_mock_3ds_key

# Resilience4j Configuration - Faster for tests
resilience4j:
  circuitbreaker:
    configs:
      default:
        registerHealthIndicator: true
        slidingWindowSize: 5
        minimumNumberOfCalls: 2
        failureRateThreshold: 50
        waitDurationInOpenState: 1s
        permittedNumberOfCallsInHalfOpenState: 2
        automaticTransitionFromOpenToHalfOpenEnabled: true
    instances:
      stripeCircuitBreaker:
        baseConfig: default
      paypalCircuitBreaker:
        baseConfig: default
      squareCircuitBreaker:
        baseConfig: default
      vaultCircuitBreaker:
        baseConfig: default
      threeDSCircuitBreaker:
        baseConfig: default
  retry:
    configs:
      default:
        maxAttempts: 2
        waitDuration: 100ms
        enableExponentialBackoff: false
    instances:
      stripeRetry:
        baseConfig: default
      paypalRetry:
        baseConfig: default
      squareRetry:
        baseConfig: default
  bulkhead:
    configs:
      default:
        maxConcurrentCalls: 5
    instances:
      stripeProcessorBulkhead:
        baseConfig: default
      paypalProcessorBulkhead:
        baseConfig: default
      squareProcessorBulkhead:
        baseConfig: default

# Async Configuration - Smaller for tests
async:
  thread-pool:
    core-size: 2
    max-size: 5
    queue-capacity: 10
    thread-name-prefix: payment-test-async-

# Management Endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: false

# Logging Configuration
logging:
  level:
    root: INFO
    ai.shreds: DEBUG
    org.springframework: INFO
    org.hibernate: INFO
    org.apache.kafka: WARN
    org.testcontainers: INFO
    org.springframework.test: DEBUG
    org.springframework.boot.test: DEBUG
    org.flywaydb: DEBUG