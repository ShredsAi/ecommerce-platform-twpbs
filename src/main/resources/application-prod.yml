spring:
  datasource:
    username: ${DB_USERNAME:webhook_user}
    password: ${DB_PASSWORD:webhook_pass}
    url: ${DB_URL:jdbc:postgresql://localhost:5432/webhook_reconciliation}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:20}
      minimum-idle: ${DB_POOL_MIN_IDLE:5}
      idle-timeout: 300000
      max-lifetime: 1200000
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        generate_statistics: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      acks: all
      retries: 3
      enable-idempotence: true
      batch-size: 16384
      linger-ms: 5
      buffer-memory: 33554432

webhook:
  stripe:
    signing-secret: ${STRIPE_WEBHOOK_SECRET}
  paypal:
    cert-url: ${PAYPAL_CERT_URL}
  square:
    application-secret: ${SQUARE_APP_SECRET}

logging:
  level:
    root: INFO
    ai.shreds: INFO
    org.springframework.web: WARN
    org.springframework.kafka: WARN
    org.hibernate.SQL: WARN
  file:
    name: logs/webhook-reconciliation.log

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info
  endpoint:
    health:
      show-details: never
  metrics:
    export:
      prometheus:
        enabled: true

server:
  shutdown: graceful
  tomcat:
    max-threads: ${SERVER_MAX_THREADS:200}
    min-spare-threads: ${SERVER_MIN_THREADS:10}