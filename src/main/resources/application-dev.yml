# Development profile configuration
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/inventory_dev
    username: inventory_dev
    password: inventory_dev
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        generate_statistics: true
  
  redis:
    host: localhost
    port: 6379
    timeout: 5000ms
    database: 1  # Use different database for dev
  
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      properties:
        enable.idempotence: false  # Disable for dev simplicity
  
  jms:
    activemq:
      broker-url: tcp://localhost:61616
      user: admin
      password: admin

# Development-specific inventory configurations
inventory:
  kafka:
    topics:
      inventory-events: dev.inventory.events
      low-stock-alerts: dev.inventory.alerts.low-stock
  jms:
    queues:
      erp-updates: dev.inventory.tracking.erp.updates
      inventory-notifications: dev.inventory.changes.notification
  safety-stock:
    monitor-interval: 60000  # 1 minute for faster testing
    batch-size: 100
  erp-sync:
    batch-size: 50
    chunk-size: 10

# Cache settings for development
cache:
  ttl: 30s  # Shorter TTL for development
  caffeine:
    maximum-size: 1000
    expire-after-write: 60s

# Outbox settings for development
outbox:
  batch-size: 10
  processing-interval: 5000  # 5 seconds for faster processing

# Enhanced logging for development
logging:
  level:
    ai.shreds: DEBUG
    org.springframework: INFO
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
    org.springframework.kafka: DEBUG
    org.springframework.jms: DEBUG
    org.hibernate: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.hibernate.stat: DEBUG
    redis.clients: DEBUG
    org.apache.kafka: INFO
  pattern:
    console: "%clr(%d{ISO8601}){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:|){faint} %m%n%wex"
    file: "%d{ISO8601} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/inventory-tracking-dev.log
    max-size: 5MB
    max-history: 5

# Development actuator settings
management:
  endpoints:
    web:
      exposure:
        include: "*"  # Expose all endpoints in development
  endpoint:
    health:
      show-details: always
    configprops:
      show-values: always
    env:
      show-values: always
  health:
    redis:
      enabled: true
    db:
      enabled: true

# Mock external services for development
mock:
  external-services: true
  product-catalog:
    enabled: true
    base-url: http://localhost:8081
  notification-service:
    enabled: true
    delay-ms: 100

# Development server settings
server:
  error:
    include-stacktrace: always
    include-message: always
    include-binding-errors: always
  tomcat:
    accesslog:
      enabled: true
      pattern: "%h %l %u %t \"%r\" %s %b %D"

# Development security settings
spring:
  security:
    user:
      name: dev
      password: dev
      roles: ADMIN,USER